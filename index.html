<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A CASA SABE SEU NOME</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .crt::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 0, 0.03) 0px, rgba(0, 255, 0, 0.03) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 9999;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: #000000cc;
            border: 2px solid #5e4a2b;
            padding: 2rem;
            border-radius: 12px;
        }
        .header {
            text-align: center;
            border-bottom: 1px dashed #5e4a2b;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            color: #efdba1;
            font-size: 1.5rem;
            letter-spacing: 2px;
            font-weight: normal;
        }
        .sub {
            color: #6c5d3a;
            font-size: 0.7rem;
            margin-top: 4px;
        }
        .image-frame {
            background: #1a1509;
            border: 3px solid #3a2f1a;
            padding: 6px;
            margin-bottom: 1.5rem;
        }
        .backrooms-img {
            width: 100%;
            display: block;
            filter: brightness(0.8) contrast(1.2) sepia(0.3);
        }
        .radio-panel {
            background: #0a0a05;
            border-left: 4px solid #dbb42c;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .message {
            color: #e0cca6;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            min-height: 4rem;
        }
        .response-area {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input {
            flex: 2;
            background: #1e1b12;
            border: 1px solid #5e4a2b;
            color: #f7eac5;
            padding: 10px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        button {
            background: #3a2f1a;
            border: none;
            color: #efdba1;
            padding: 10px 20px;
            font-family: monospace;
            cursor: pointer;
        }
        button:hover { background: #5e4a2b; }
        .log {
            margin-top: 1rem;
            color: #6c5d3a;
            font-size: 0.8rem;
            border-top: 1px dotted #3a2f1a;
            padding-top: 0.8rem;
        }
        .terminal {
            background: #030301;
            padding: 0.8rem;
            border: 1px solid #3a2f1a;
            font-size: 0.7rem;
            color: #4a7a3a;
        }
        .terminal-line {
            padding: 2px 0;
            border-bottom: 1px dotted #1a1a0a;
        }
        .blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .tape {
            animation: tapeGlitch 0.3s infinite alternate;
        }
        @keyframes tapeGlitch {
            0% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0.5; transform: translateX(3px); }
        }
        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.6rem;
            color: #3a2f1a;
        }
    </style>
</head>
<body class="crt">
    <div class="container">
        <div class="header">
            <h1>🏚️ A CASA SABE SEU NOME 🏚️</h1>
            <div class="sub">[ FREQ: 18.7 Hz || SINAL INSTÁVEL ]</div>
            <div class="sub">✦ VOCÊ É ELARA. VOSS ESTÁ DO LADO DE FORA. ✦</div>
        </div>

        <div class="image-frame">
            <img class="backrooms-img" id="mainImage" src="https://i.ibb.co/q4XLK0J/file-00000000db30720eb87e48c6f04646bc.png" alt="Casa">
        </div>

        <div class="radio-panel">
            <div class="message" id="receivedMessage">📡 Dr. Voss: "Elara... você entrou? A porta fechou atrás de você."</div>
            <div class="response-area">
                <input type="text" id="answerInput" placeholder="Sua resposta..." autocomplete="off">
                <button id="submitBtn">📡 RESPONDER</button>
            </div>
            <div class="log" id="logMessage">⚡ Elara... responda.</div>
        </div>

        <div class="terminal">
            <div class="terminal-line">> SISTEMA DE COMUNICAÇÃO // SUBLEVEL_3</div>
            <div class="terminal-line" id="dynamicLine">> Dr. Voss aguarda sua resposta.</div>
            <div class="terminal-line blink">> _</div>
        </div>

        <footer>⚠️ NÃO CORTE O SINAL ⚠️</footer>
    </div>

    <script>
        // ============================================
        // ÁUDIO DE ESTÁTICA (fundo)
        // ============================================
        let audioCtx = null;
        let staticSource = null;
        let staticGain = null;
        let staticEnabled = true;

        function initStatic() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            staticGain = audioCtx.createGain();
            staticGain.gain.value = 0.1;
            staticGain.connect(audioCtx.destination);
            generateStatic();
        }

        function generateStatic() {
            if (!audioCtx || !staticEnabled) return;
            if (staticSource) try { staticSource.stop(); } catch(e) {}
            const bufferSize = 4096;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            staticSource = audioCtx.createBufferSource();
            staticSource.buffer = noiseBuffer;
            staticSource.loop = true;
            staticSource.connect(staticGain);
            staticSource.start();
        }

        document.body.addEventListener('click', function initAudio() {
            if (!audioCtx) { initStatic(); generateStatic(); }
            document.body.removeEventListener('click', initAudio);
        });

        // ============================================
        // ROTEIRO DO ARG (6 fases + final)
        // ============================================
        const fases = [
            {
                mensagem: '📡 Dr. Voss: "Elara... você entrou? A porta fechou atrás de você. Me responda."',
                respostaCorreta: "sim",
                dica: "Diga que sim.",
                vossFala: "Elara, responde! A porta fechou!"
            },
            {
                mensagem: '📡 Dr. Voss: "Tem um corredor à sua frente. Elara... o que você vê?"',
                respostaCorreta: "amarelo",
                dica: "Descreva a cor do corredor.",
                vossFala: "Elara, foca! O que tem à sua frente?"
            },
            {
                mensagem: '📡 Dr. Voss: "Elara... você ouviu isso? Alguém sussurrou seu nome."',
                respostaCorreta: "ouvi",
                dica: "Diga se ouviu ou não.",
                vossFala: "Não é brincadeira, Elara. Me diz se ouviu."
            },
            {
                mensagem: '📡 Dr. Voss: "Elara, tem algo escrito na parede. O que diz?"',
                respostaCorreta: "bem vindo",
                dica: "O que está escrito na parede?",
                vossFala: "Lê direito, Elara! O que tá escrito?"
            },
            {
                mensagem: '📡 Dr. Voss: "Elara... alguém tocou no seu ombro. Quem é?"',
                respostaCorreta: "ninguem",
                dica: "Tem alguém aí?",
                vossFala: "Responde, Elara! Quem tá aí?"
            },
            {
                mensagem: '📡 Dr. Voss: "Elara... a casa... ela tá... (estática)... VOSS? VOSS!"',
                respostaCorreta: "voss sumiu",
                dica: "O que aconteceu com o Voss?",
                vossFala: "Elara... a casa... ela tá..."
            }
        ];

        let faseAtual = 0;
        let jogoConcluido = false;
        const receivedMsg = document.getElementById('receivedMessage');
        const answerInput = document.getElementById('answerInput');
        const submitBtn = document.getElementById('submitBtn');
        const logMessage = document.getElementById('logMessage');
        const dynamicLine = document.getElementById('dynamicLine');
        const container = document.querySelector('.container');

        function atualizarFase() {
            if (jogoConcluido) return;
            if (faseAtual >= fases.length) {
                finalDoJogo();
                return;
            }
            const fase = fases[faseAtual];
            receivedMsg.innerHTML = fase.mensagem;
            logMessage.innerHTML = `⚡ [FASE ${faseAtual+1}/${fases.length}] ${fase.dica}`;
            dynamicLine.innerHTML = `> Dr. Voss: "${fase.vossFala}"`;
            answerInput.value = '';
            answerInput.focus();
        }

        function checkAnswer() {
            if (jogoConcluido) return;
            const user = answerInput.value.trim().toLowerCase();
            const fase = fases[faseAtual];
            
            if (user.includes(fase.respostaCorreta.toLowerCase())) {
                // Acertou
                logMessage.innerHTML = `✅ Elara: "${user}" → Sinal estável.`;
                dynamicLine.innerHTML = `> Voss: "Certo, Elara. Continua."`;
                faseAtual++;
                if (faseAtual < fases.length) {
                    atualizarFase();
                } else {
                    finalDoJogo();
                }
            } else {
                // Errou
                logMessage.innerHTML = `❌ Voss não entendeu. ${fase.dica}`;
                dynamicLine.innerHTML = `> Voss repete: "${fase.vossFala}"`;
                // Efeito de glitch visual
                container.classList.add('tape');
                setTimeout(() => container.classList.remove('tape'), 500);
                // Aumenta estática
                if (audioCtx) {
                    staticGain.gain.value = 0.25;
                    setTimeout(() => staticGain.gain.value = 0.1, 1000);
                }
            }
            answerInput.value = '';
        }

        function finalDoJogo() {
            jogoConcluido = true;
            receivedMsg.innerHTML = '💀 [SINAL PERDIDO] A casa sussurra: "Elara... você nunca esteve com Voss. Ele morreu há 3 anos. Você está sozinha."';
            answerInput.disabled = true;
            submitBtn.disabled = true;
            logMessage.innerHTML = "🏚️ FIM. A casa agora te observa em silêncio. Uma silhueta aparece na janela.";
            dynamicLine.innerHTML = "> TRANSMISSÃO ENCERRADA // A CASA SABE SEU NOME";
            container.classList.add('tape');
            
            // Áudio grave 18.7 Hz
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 18.7;
                gain.gain.value = 0.08;
                osc.start();
                setTimeout(() => ctx.close(), 3000);
            } catch(e) {}
            
            setTimeout(() => {
                const overlay = document.createElement('div');
                overlay.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:100000; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#ffcc66; text-align:center; font-family:monospace; padding:20px;";
                overlay.innerHTML = `
                    <h1 style="font-size:2.5rem;">🏚️ A CASA SABE SEU NOME 🏚️</h1>
                    <p style="font-size:1.2rem; margin-top:20px;">"Elara... você nunca esteve com Voss."</p>
                    <p style="font-size:1rem; margin-top:10px; color:#886633;">Ele morreu há 3 anos. Você está sozinha.</p>
                    <p style="font-size:0.8rem; margin-top:20px; color:#553322;">[ 18.7 Hz — A casa está respirando ]</p>
                    <button id="resetBtn" style="margin-top:30px; padding:10px 20px; background:#332211; color:white; border:1px solid #ffcc66; cursor:pointer;">🔁 REINICIAR</button>
                `;
                document.body.appendChild(overlay);
                document.getElementById('resetBtn').onclick = () => location.reload();
            }, 2000);
        }

        submitBtn.addEventListener('click', checkAnswer);
        answerInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });

        // Easter egg: clique na imagem
        document.querySelector('.backrooms-img').addEventListener('click', () => {
            logMessage.innerHTML = "🔍 Você encostou na tela. A imagem parece pulsar. 18.7 Hz.";
            if (audioCtx) {
                staticGain.gain.value = 0.2;
                setTimeout(() => staticGain.gain.value = 0.1, 500);
            }
        });

        atualizarFase();
    </script>
</body>
</html>
